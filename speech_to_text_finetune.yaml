name: "Speech_To_Text_Finetuning"

init_from_pretrained_model: nvidia/parakeet-tdt-0.6b-v3

model:
  sample_rate: 16000
  activation_checkpointing: true
  train_ds:
    shar_path: hf://buckets/Tyl3rDrden/IvritKnessetRecordingsData
    use_lhotse: true
    is_tarred: true
    batch_size: 1
    allow_missing_data: true
    shuffle: false
    num_workers: 8
    pin_memory: true

  validation_ds:
    manifest_path: null
    shar_path: hf://buckets/Tyl3rDrden/parkaeetValidation
    use_lhotse: true
    is_tarred: true
    batch_size: 1
    allow_missing_data: true
    shuffle: false
    num_workers: 8
    pin_memory: true

  test_ds:
    manifest_path: null
    shar_path: hf://buckets/Tyl3rDrden/parkaeetTest
    use_lhotse: true
    is_tarred: true
    batch_size: 1
    allow_missing_data: true
    shuffle: false
    num_workers: 8
    pin_memory: true
  
  char_labels:
    update_labels: false
    labels: null

  tokenizer:
    update_tokenizer: true
    dir: ./tokenizer_spe_bpe_v32768_pad_bos_eos
    type: bpe

  spec_augment:
    _target_: nemo.collections.asr.modules.SpectrogramAugmentation
    freq_masks: 2
    time_masks: 10
    freq_width: 27
    time_width: 0.05

  optim:
    name: adamw
    lr: 1e-4
    betas: [0.9, 0.98]
    weight_decay: 1e-3

    sched:
      name: CosineAnnealing
      warmup_steps: 5000
      warmup_ratio: null
      min_lr: 5e-6

trainer:
  devices: -1
  num_nodes: 1
  max_epochs: -1
  max_steps: 1000000
  val_check_interval: 2000
  accelerator: auto
  strategy:
    _target_: lightning.pytorch.strategies.DDPStrategy
    gradient_as_bucket_view: true
  accumulate_grad_batches: 16
  gradient_clip_val: 0.0
  precision: 16-mixed
  log_every_n_steps: 500
  enable_progress_bar: True
  num_sanity_val_steps: 0
  check_val_every_n_epoch: 1
  use_distributed_sampler: false
  sync_batchnorm: true
  enable_checkpointing: False
  logger: false
  benchmark: false

exp_manager:
  exp_dir: null
  name: ${name}
  create_tensorboard_logger: true
  create_checkpoint_callback: true
  checkpoint_callback_params:
    monitor: "val_wer"       # The metric to track
    mode: "min"              # We want to MINIMIZE the error rate
    save_top_k: 5            # Keep the 5 best versions
    every_n_epochs: 1
    always_save_nemo: True
    save_best_model: True    # Ensures the best overall is saved as a .nemo file
  resume_if_exists: True
  resume_ignore_no_checkpoint: True
  create_wandb_logger: True
  wandb_logger_kwargs:
    name: runV2.0
    log_model: True
    project: ParkaeetRealExperiment